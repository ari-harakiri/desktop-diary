  <!-- SIGN ON -->
  <div id="signon-wrap" class="win" style="display:none;">
    <div class="titlebar"><span class="t-title"><span class="ttl-icon"></span><span>Sign On</span></span><span class="t-btns"><button class="win-btn" id="signon-close" type="button" title="Close Sign On" aria-label="Close Sign On">X</button></span></div>
    <div class="dtd-construction"><span>UNDER CONSTRUCTION</span></div>
    <div class="win-body">
      <div class="mascot" id="mascot-slot"></div>
      
      <div class="signon-error" id="signon-error"></div>

      <div class="field-row"><label for="in-email">Email</label><input type="email" id="in-email" autocomplete="email"></div>
      <div class="field-row"><label for="in-password">Password</label><input type="password" id="in-password"></div>

      <div class="check-row">
        <span class="ck"><input type="checkbox" id="in-savepw"><label for="in-savepw">Save password</label></span>
        <span class="ck"><input type="checkbox" id="in-autologin"><label for="in-autologin">Auto sign-in</label></span>
      </div>

      <div class="signon-options-row">
        <span class="icon-btn" id="btn-help" role="button" tabindex="0" title="Help" aria-label="Open Help"><b>?</b></span>
        <div class="signon-link-stack">
          <div class="forgot-row" id="forgot-row"><span class="forgot-link" id="forgot-link">Forgot Password?</span></div>
          <div class="forgot-row" id="account-switch-row"><span class="forgot-link" id="account-switch">Already have an account? Sign On</span></div>
        </div>
      </div>

      <div class="signon-bottom">
        <span class="signon-go" id="signon-submit"><span id="signon-go-icon"></span><span id="signon-go-label">Sign On</span></span>
      </div>
      <div class="signon-version">Version 1.0</div>
    </div>
  </div>
