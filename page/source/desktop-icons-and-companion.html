<div id="desktop">

  <div id="signon-icon" class="desktop-icon" role="button" tabindex="0" title="Open DesktopDiary Sign On" style="display:none;">
    <img src="" id="signon-icon-img" width="48" height="52" alt="DesktopDiary sign-on icon">
    <span>Sign On</span>
  </div>

  <div id="dtd-mailbox-icon" class="desktop-icon" role="button" tabindex="0" title="Open DtD Post Mail">
    <span class="dtd-pigeon" aria-hidden="true"></span>
    <span class="dtd-outgoing-envelope" aria-hidden="true"></span>
    <img class="dtd-mailbox-art" src="assets/embedded/pigeon-mailbox.png" alt="">
    <span>DtD Post</span>
  </div>

  <div id="arinet-desktop-icon" class="desktop-icon" role="button" tabindex="0" title="Open AriNet Browser">
    <div class="arinet-desktop-icon-art"><img src="assets/embedded/arinet-desktop-icon.png" alt="AriNet"></div>
    <span>AriNet</span>
  </div>

  <div id="desktop-companion" class="desktop-icon" role="button" tabindex="0" title="Koba the Computa Companion">
    <div id="koba-click-target" aria-hidden="true"></div>
    <div class="companion-dog-sprite" aria-hidden="true"></div>
    <div id="koba-ball-thought" aria-hidden="true"></div>
    <div id="companion-keepsake-box" aria-hidden="true"><div class="box-lid"></div><div class="box-body"></div><div class="box-clasp"></div></div>
    <div id="companion-actions" role="dialog" aria-label="Koba's interaction menu">
      <div class="koba-panel-head"><span>Koba’s Menu</span><button type="button" class="koba-panel-close" aria-label="Close Koba’s menu">×</button></div>
      <button type="button" id="companion-memos-action" class="koba-memos-shortcut" data-companion-action="memos">Memos</button>
      <div class="koba-action-panel" aria-label="Koba actions">
        <button type="button" data-companion-action="feed">Feed</button>
        <button type="button" data-companion-action="bone">Give a Bone</button>
        <button type="button" data-companion-action="treat">Give a Treat!</button>
        <button type="button" data-companion-action="pet">Pet</button>
        <button type="button" data-companion-action="praise">Good Boy!</button>
      </div>
    </div>
    <div id="companion-reaction" aria-live="polite"></div>
  </div>

  <div id="trash-desktop-icon" class="desktop-icon" role="button" tabindex="0" title="Open Trash">
    <div class="trash-icon-art"><img src="assets/embedded/trash-icon.png" alt=""><b id="trash-count"></b></div>
    <span>Trash</span>
  </div>
